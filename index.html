<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windsurf Log</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1e1e1e;
            padding: 10px 20px;
        }
        nav {
            display: flex;
            justify-content: space-around;
        }
        .container {
            padding: 20px;
        }
        .photo-picker {
            border: 2px dashed #ffffff;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .form-control {
            margin: 10px 0;
        }
        slider, toggle {
            width: 100%;
        }
        .rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
        }
        .rating input {
            display: none;
        }
        .rating label {
            cursor: pointer;
            font-size: 2em;
            color: #555;
        }
        .rating input:checked ~ label {
            color: #f5c84b;
        }
        .compass {
            position: relative;
            width: 100px;
            height: 100px;
            border: 5px solid #ffffff;
            border-radius: 50%;
            margin: auto;
        }
        .needle {
            position: absolute;
            width: 2px;
            height: 50px;
            background: red;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transform: rotate(0deg);
        }
    </style>
</head>
<body>
    <header>
        <h1>Windsurf Log</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Profile</a>
            <a href="#">Logs</a>
        </nav>
    </header>
    <div class="container">
        <div class="photo-picker">Drag & Drop Photo Here</div>
        <div class="form-control">
            <label for="wind-direction">Wind Direction:</label>
            <div class="compass">
                <div class="needle"></div>
            </div>
        </div>
        <div class="form-control">
            <label for="slider">Wind Intensity:</label>
            <input type="range" id="slider" min="1" max="10">
        </div>
        <div class="form-control">
            <label for="toggle">Toggle:</label>
            <input type="checkbox" id="toggle">
        </div>
        <div class="form-control">
            <label>Rating:</label>
            <div class="rating">
                <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
                <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
            </div>
        </div>
    </div>
    <script>
        // JavaScript for session management and storage
        localStorage.setItem('windData', JSON.stringify({ windDirection: 0, windIntensity: 5 }));

        // Sample functionality to manage and update session
        function updateSession() {
            const windDirection = document.getElementById('slider').value;
            localStorage.setItem('windData', JSON.stringify({ windDirection }));
        }

        document.getElementById('slider').oninput = updateSession;
    </script>
</body>
</html>
