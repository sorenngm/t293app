<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windsurf Log</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Windsurf Log Application</h1>
        <nav>
            <ul>
                <li><a href="#profile">Profile</a></li>
                <li><a href="#session-form">Session Form</a></li>
                <li><a href="#detailed-sessions">Detailed Sessions</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="profile">
            <h2>User Profile</h2>
            <form id="profile-form">
                <label for="name">Name:</label>
                <input type="text" id="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" required>
                <button type="submit">Save</button>
            </form>
        </section>
        <section id="session-form">
            <h2>Add Session</h2>
            <form id="session-entry">
                <label for="date">Date:</label>
                <input type="date" id="date" required>
                <label for="wind-speed">Wind Speed (km/h):</label>
                <input type="number" id="wind-speed" required>
                <label for="sail-config">Sail Configuration:</label>
                <select id="sail-config" required>
                    <option value="5.0">5.0 m²</option>
                    <option value="5.5">5.5 m²</option>
                    <option value="6.0">6.0 m²</option>
                    <option value="6.5">6.5 m²</option>
                </select>
                <label for="photos">Photos:</label>
                <input type="file" id="photos" multiple>
                <button type="submit">Add Session</button>
            </form>
        </section>
        <section id="detailed-sessions">
            <h2>Session Tracking</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Wind Speed</th>
                        <th>Sail Config</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="session-list">
                    <!-- Dynamic session entries will be populated here -->
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Windsurf Log App</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
